<!DOCTYPE html>
<html>
<head>
    <title>Django Public Blog - создать статью</title>
    {% load static %}
    <link rel="stylesheet" href="{% static '/article.css' %}">
</head>
<body class="archive">
    <div class="container">
        <div class="logo-wrapper">
            <div class="logo">
                <h1>Django Public blog</h1>
            </div>
        </div>

        <div class="form-container">
            <h2>✏️ Написать новую статью</h2>

            <form method="POST" class="create-form">
                {% csrf_token %}

                <div class="form-group">
                    <label for="title">Название статьи</label>
                    <input type="text" name="title" id="title" placeholder="Введите название..." value="{{ form.title }}">
                </div>

                <div class="form-group">
                    <label for="text">Текст статьи</label>
                    <textarea name="text" id="text" placeholder="Введите текст статьи..." rows="12">{{ form.text }}</textarea>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn-submit">📝 Опубликовать</button>
                    <a href="/" class="btn-cancel">❌ Отмена</a>
                </div>

                {% if form.errors %}
                    <div class="error-message">
                        ⚠️ {{ form.errors }}
                    </div>
                {% endif %}
            </form>
        </div>
    </div>
</body>
</html>
